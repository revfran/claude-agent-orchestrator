name: Benchmark

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Run benchmark
        run: |
          python -m benchmarks.run_benchmark \
            --iterations 5 \
            --output benchmark_current.json \
            --compare benchmarks/baseline.json

      - name: Post benchmark results to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read comparison markdown if it exists
            let body = '## Benchmark Results\n\n';
            const mdPath = 'benchmark_current.md';
            if (fs.existsSync(mdPath)) {
              body = fs.readFileSync(mdPath, 'utf8');
            } else {
              // Fall back to raw JSON
              const jsonPath = 'benchmark_current.json';
              if (fs.existsSync(jsonPath)) {
                const results = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
                body += '```json\n' + JSON.stringify(results, null, 2) + '\n```';
              } else {
                body += '⚠️ Benchmark results not found.';
              }
            }

            // Find existing benchmark comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Benchmark Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
